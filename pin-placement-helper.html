<!doctype html>
<!--
  PIN PLACEMENT HELPER
  Open this file directly in your browser (double-click it, no server needed).
  Click anywhere on the map image and it will show you the map_x / map_y
  percentage values to use in seed.py or the admin API for that plot.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pine Ridge - Pin Placement Helper</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
    h2 { margin-top: 0; }
    #wrapper { position: relative; display: inline-block; border: 2px solid #333; }
    #map-img { display: block; max-width: 900px; height: auto; cursor: crosshair; }
    #readout {
      margin-top: 12px;
      padding: 12px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
      max-width: 900px;
      white-space: pre-wrap;
    }
    .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h2>Click the map to get map_x / map_y for a plot</h2>
  <div id="wrapper">
    <img id="map-img" src="frontend/public/cemetery-map.png" alt="Pine Ridge site plan" />
  </div>
  <div id="readout">Click anywhere on the map above...</div>

  <script>
    const img = document.getElementById("map-img");
    const wrapper = document.getElementById("wrapper");
    const readout = document.getElementById("readout");

    wrapper.addEventListener("click", (e) => {
      const rect = img.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const pctX = ((x / rect.width) * 100).toFixed(2);
      const pctY = ((y / rect.height) * 100).toFixed(2);

      // drop a visual marker
      const dot = document.createElement("div");
      dot.className = "dot";
      dot.style.left = x + "px";
      dot.style.top = y + "px";
      wrapper.appendChild(dot);

      readout.textContent =
        `map_x: ${pctX}\nmap_y: ${pctY}\n\n` +
        `Use like this in seed.py:\n"map_x": ${pctX}, "map_y": ${pctY}`;
    });
  </script>
</body>
</html>
